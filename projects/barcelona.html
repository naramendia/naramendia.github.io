<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/projects-style.css" />
    <link rel="stylesheet" type="text/css" href="/css/general-style.css" />
    <title>Natalie's Webpage</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.99em' font-size='80'>🧭</text></svg>" />
    <style>
        body, html {
            font-family: 'Montserrat', sans-serif;
        }
        .image-grid {
            display: grid;
            grid-template-columns: 1fr;
            place-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .image-grid img {
            max-width: 500px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>
    <header>
        <a href="../index.html" id="Natalie-sticky">Natalie Aramendia</a>

        <nav class="navigation">
            <a href="../index.html" class="nav-button">HOME</a>
            <a href="../projects.html" class="nav-button">PROJECTS</a>
            <a href="../about.html" class="nav-button">ABOUT</a>
            <a href="../cv.html" class="nav-button">CV</a>
            <a href="../contact.html" class="nav-button">CONTACT</a>
        </nav>
    </header>



    <main>
        <div>
            <div class="container-div">
                <a href="../projects.html" class="back-button">&#8592; Back to Projects</a>
                <h1 class="project-pages-title">Barcelona Gothic Quarter</h1>
                <div class="image-grid">
                    <img src="../img/gothic/gothic_final.png" alt="Map of Barcelona Gothic Quarter">

                </div>
            </div>

    </main>






    <footer>
        <p>© 2025 Natalie Aramendia</p>
    </footer>

    <script>
        let list = document.querySelectorAll('.list');
        let itemBox = document.querySelectorAll('.itemBox');

        for (let i = 0; i < list.length; i++) {
            list[i].addEventListener('click', function () {
                for (let j = 0; j < list.length; j++) {
                    list[j].classList.remove('active');
                }
                this.classList.add('active');

                let dataFilter = this.getAttribute('data-filter');

                for (let k = 0; k < itemBox.length; k++) {
                    itemBox[k].classList.remove('active');
                    itemBox[k].classList.add('hide');

                    if (
                        itemBox[k].getAttribute('data-item').includes(dataFilter) ||
                        dataFilter === 'all'
                    ) {
                        itemBox[k].classList.remove('hide');
                        itemBox[k].classList.add('active');
                    }
                }
            });
        }
    </script>
</body>

</html>
